<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AlienSignal — UFO & Alien News</title>
  <meta name="description" content="The latest UFO sightings, alien encounters, UAP disclosures and extraterrestrial stories from around the world. Updated every 3 days." />
  <meta name="keywords" content="UFO, alien, UAP, extraterrestrial, sighting, disclosure, unidentified aerial phenomena, space" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://alien.workers.dev/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="AlienSignal — UFO & Alien News" />
  <meta property="og:description" content="The latest UFO sightings, alien encounters and UAP disclosures. Updated every 3 days." />
  <meta property="og:url" content="https://alien.workers.dev/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AlienSignal — UFO & Alien News" />
  <meta name="twitter:description" content="Latest UFO sightings, UAP disclosures and alien stories." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👽</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Orbitron:wght@700;900&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />

  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebSite","name":"AlienSignal","url":"https://alien.workers.dev/","description":"UFO and alien news from around the world"}
  </script>
</head>
<body>

  <canvas id="bg" aria-hidden="true"></canvas>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="container">
      <div class="nav">
        <a href="/" class="logo">
          <span class="logo-glyph">👽</span>
          ALIEN<span class="logo-hi">SIGNAL</span>
        </a>
        <div class="nav-right">
          <span class="live-pill">
            <span class="live-dot"></span>
            <span id="statusText">Live</span>
          </span>
          <button class="btn-primary" id="scanBtn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Scan Now
          </button>
        </div>
      </div>

      <div class="hero-banner">
        <h1 class="hero-headline">
          They're out there.<br>
          <span class="hero-hi">We're watching.</span>
        </h1>
        <p class="hero-sub">UFO sightings, alien encounters & UAP disclosures — curated every 3 days</p>
        <div class="hero-stats">
          <div class="hstat"><span class="hstat-n" id="totalArticles">—</span><span class="hstat-l">Signals</span></div>
          <div class="hstat-div"></div>
          <div class="hstat"><span class="hstat-n" id="lastScan">—</span><span class="hstat-l">Last scan</span></div>
          <div class="hstat-div"></div>
          <div class="hstat"><span class="hstat-n" id="nextScan">—</span><span class="hstat-l">Next update</span></div>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Controls ── -->
  <div class="controls-bar">
    <div class="container controls-inner">
      <div class="search-wrap">
        <svg class="search-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="searchInput" class="search-input" type="search" placeholder="Search signals…" autocomplete="off" />
      </div>
      <div class="filters" id="filters">
        <button class="chip active" data-source="all">All sources</button>
      </div>
    </div>
  </div>

  <!-- ── Content ── -->
  <main class="main container">

    <div id="skeletons" class="grid" style="display:none"></div>

    <div id="heroWrap" style="display:none">
      <div id="heroCard"></div>
    </div>

    <section id="grid" class="grid" style="display:none"></section>

    <div id="empty" class="empty" style="display:none">
      <div class="empty-ico">🌌</div>
      <h2>No signals detected</h2>
      <p>Try scanning or adjusting your search.</p>
      <button class="btn-primary large" onclick="triggerScan()">Start scanning</button>
    </div>

    <nav id="pagination" class="pagination"></nav>
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-logo">👽 AlienSignal</span>
      <span class="footer-tagline">Watching the skies since 2025</span>
      <span class="footer-copy">&copy; <span id="year"></span></span>
    </div>
  </footer>

  <div id="toasts" aria-live="polite" class="toasts"></div>
  <script src="/js/main.js"></script>
</body>
</html>
